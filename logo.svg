<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8bff"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8bff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Glow effect behind rocket -->
  <ellipse cx="256" cy="320" rx="60" ry="80" fill="url(#glow)" filter="url(#blur)" opacity="0.6"/>

  <!-- Rocket body -->
  <path d="M256 100 C220 140 210 200 210 260 L256 280 L302 260 C302 200 292 140 256 100Z" fill="url(#rocket)"/>

  <!-- Rocket nose -->
  <path d="M256 80 C240 90 230 110 228 130 L256 120 L284 130 C282 110 272 90 256 80Z" fill="#ffffff" opacity="0.9"/>

  <!-- Rocket window -->
  <circle cx="256" cy="210" r="24" fill="#0a0a1a" stroke="#4f8bff" stroke-width="3"/>
  <circle cx="256" cy="210" r="16" fill="#1a1a3e"/>
  <circle cx="256" cy="210" r="8" fill="#4f8bff" opacity="0.8"/>
  <circle cx="252" cy="206" r="3" fill="white" opacity="0.6"/>

  <!-- Left fin -->
  <path d="M210 260 L170 310 L210 300 Z" fill="#ff6b35" opacity="0.9"/>

  <!-- Right fin -->
  <path d="M302 260 L342 310 L302 300 Z" fill="#ff6b35" opacity="0.9"/>

  <!-- Flame outer -->
  <ellipse cx="256" cy="310" rx="30" ry="45" fill="#ff6b35" opacity="0.7"/>

  <!-- Flame middle -->
  <ellipse cx="256" cy="315" rx="18" ry="35" fill="#ffaa00" opacity="0.9"/>

  <!-- Flame inner -->
  <ellipse cx="256" cy="318" rx="10" ry="22" fill="#ffffff" opacity="0.95"/>

  <!-- Stars -->
  <circle cx="140" cy="140" r="3" fill="white" opacity="0.8"/>
  <circle cx="370" cy="160" r="2" fill="white" opacity="0.6"/>
  <circle cx="120" cy="300" r="2" fill="white" opacity="0.5"/>
  <circle cx="390" cy="280" r="3" fill="white" opacity="0.7"/>
  <circle cx="160" cy="380" r="2" fill="#4f8bff" opacity="0.8"/>
  <circle cx="350" cy="370" r="2" fill="#4f8bff" opacity="0.6"/>
  <circle cx="180" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="340" cy="220" r="1.5" fill="white" opacity="0.5"/>

  <!-- Nexus text -->
  <text x="256" y="430" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">NEXUS</text>

  <!-- Accent line under text -->
  <rect x="180" y="440" width="152" height="3" rx="2" fill="url(#rocket)"/>
</svg>
